<style>
:root {
  --rosa:#4DA9E0; --violeta:#0B3D91; --lila:#6CACE4;
  --rosa-claro:#EAF4FC; --violeta-claro:#DCEEFC;
  --fondo:#fff; --gris:#F3F9FE; --gris2:#CFE5F7;
  --texto:#0D2D52; --rojo:#e53935; --azul:#0B3D91; --naranja:#F6B40E;
  --oro:#F6B40E;
  --acento:var(--rosa);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--fondo);color:var(--texto);font-family:'Inter',sans-serif;min-height:100vh;}

header{background:linear-gradient(135deg,var(--violeta),var(--rosa));padding:16px;text-align:center;border-bottom:3px solid var(--lila);}
.vamos-cuarta{font-family:'Oswald',sans-serif;font-weight:700;letter-spacing:1px;color:var(--oro);
  font-size:0.85rem;margin-top:4px;text-shadow:0 1px 2px rgba(0,0,0,0.25);}
header h1{font-family:'Oswald',sans-serif;font-size:1.7rem;font-weight:700;color:#fff;letter-spacing:2px;}
header p{font-size:0.72rem;color:rgba(255,255,255,0.75);margin-top:2px;}
.ultima-act{font-size:0.68rem;color:rgba(255,255,255,0.6);margin-top:4px;}

nav{display:flex;background:#fff;border-bottom:2px solid var(--gris2);overflow-x:auto;}
nav button{flex:0 0 auto;padding:11px 12px;background:none;border:none;color:var(--lila);
  font-family:'Oswald',sans-serif;font-size:0.8rem;letter-spacing:1px;cursor:pointer;
  border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap;}
nav button.active{color:var(--rosa);border-bottom-color:var(--rosa);}
nav button:hover:not(.active){color:var(--violeta);}

.tab-content{display:none;padding:14px;max-width:720px;margin:0 auto;}
.tab-content.active{display:block;}

.grupo-header{font-family:'Oswald',sans-serif;font-size:0.68rem;letter-spacing:2px;
  color:var(--violeta);padding:7px 0 5px;margin-top:14px;margin-bottom:4px;
  border-bottom:2px solid var(--gris2);text-transform:uppercase;}
.grupo-header:first-child{margin-top:0;}

.partido{background:var(--gris);border-radius:10px;padding:10px 12px;margin-bottom:6px;
  border-left:3px solid transparent;box-shadow:0 1px 4px rgba(123,45,139,0.07);position:relative;}
.partido.favorito{border-left-color:var(--rosa);}
.partido-row{display:flex;align-items:center;gap:8px;}
.partido .fecha-hora{font-size:0.68rem;color:var(--lila);min-width:52px;line-height:1.5;}
.partido .equipos{flex:1;font-size:0.88rem;color:var(--texto);}
.partido .vs{color:var(--lila);font-size:0.72rem;margin:0 4px;}
.partido .resultado{font-family:'Oswald',sans-serif;font-size:1rem;font-weight:700;color:var(--rosa);min-width:44px;text-align:center;}
.partido .resultado.pendiente{color:var(--gris2);font-size:0.7rem;}

.historial-row{margin-top:8px;padding-top:8px;border-top:1px dashed var(--gris2);position:relative;}
.btn-historial{background:none;border:1px solid var(--lila);border-radius:6px;color:var(--violeta);
  font-size:0.68rem;padding:4px 9px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  font-family:'Oswald',sans-serif;letter-spacing:0.4px;}
.btn-historial:hover{border-color:var(--rosa);color:var(--rosa);background:var(--rosa-claro);}
.historial-tooltip{display:none;position:absolute;left:0;right:0;top:100%;margin-top:8px;
  background:#fff;border:2px solid var(--lila);border-radius:10px;padding:11px 13px;
  box-shadow:0 6px 20px rgba(123,45,139,0.18);z-index:30;font-size:0.74rem;color:var(--texto);}
.historial-tooltip.open{display:block;}
.historial-tooltip::before{content:'';position:absolute;top:-7px;left:18px;width:12px;height:12px;
  background:#fff;border-left:2px solid var(--lila);border-top:2px solid var(--lila);transform:rotate(45deg);}
.hist-rival{font-family:'Oswald',sans-serif;font-size:0.78rem;color:var(--violeta);margin-bottom:7px;letter-spacing:0.3px;}
.hist-fila{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--gris);}
.hist-fila:last-of-type{border-bottom:none;}
.hist-anio{font-family:'Oswald',sans-serif;font-weight:700;color:var(--rosa);min-width:36px;font-size:0.72rem;}
.hist-inst{flex:1;color:var(--texto);font-size:0.7rem;}
.hist-res{font-family:'Oswald',sans-serif;font-weight:700;color:var(--violeta);font-size:0.78rem;white-space:nowrap;}
.hist-vacio{font-size:0.72rem;color:var(--lila);padding:2px 0 4px;line-height:1.4;}
.hist-extra{margin-top:7px;padding-top:7px;border-top:1px dashed var(--gris2);font-size:0.68rem;color:var(--lila);line-height:1.45;}
.btn-edit{background:none;border:1px solid var(--gris2);border-radius:6px;
  color:var(--lila);font-size:0.7rem;padding:2px 6px;cursor:pointer;}
.btn-edit:hover{border-color:var(--rosa);color:var(--rosa);}
.btn-fav{background:none;border:none;cursor:pointer;font-size:1rem;opacity:0.3;}
.btn-fav.activo{opacity:1;}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(123,45,139,0.4);z-index:100;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:20px;width:90%;max-width:340px;border:2px solid var(--lila);box-shadow:0 8px 32px rgba(233,30,140,0.15);}
.modal h3{font-family:'Oswald',sans-serif;color:var(--violeta);margin-bottom:14px;font-size:1rem;}
.modal .partido-info{font-size:0.82rem;color:var(--lila);margin-bottom:14px;}
.goles-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.goles-row label{font-size:0.78rem;flex:1;color:var(--texto);}
.goles-row input{width:60px;background:var(--gris);border:2px solid var(--gris2);border-radius:8px;
  color:var(--rosa);font-family:'Oswald',sans-serif;font-size:1.3rem;text-align:center;padding:4px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-ok{background:linear-gradient(135deg,var(--violeta),var(--rosa));color:white;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'Oswald',sans-serif;}
.btn-cancel{background:none;border:1px solid var(--gris2);color:var(--lila);border-radius:8px;padding:7px 12px;cursor:pointer;}
.btn-clear{background:none;border:1px solid var(--rojo);color:var(--rojo);border-radius:8px;padding:7px 10px;cursor:pointer;margin-right:auto;font-size:0.75rem;}

.tabla-wrap{overflow-x:auto;margin-bottom:4px;}
table{width:100%;border-collapse:collapse;font-size:0.8rem;}
th{font-family:'Oswald',sans-serif;font-size:0.65rem;letter-spacing:1px;color:var(--lila);
  padding:5px;text-align:center;border-bottom:2px solid var(--gris2);}
th:first-child{text-align:left;padding-left:8px;}
td{padding:7px 5px;text-align:center;border-bottom:1px solid var(--gris2);color:var(--texto);}
td:first-child{text-align:left;padding-left:8px;font-size:0.82rem;}
tr.clasif td:first-child{border-left:3px solid var(--rosa);}
tr.playoff td:first-child{border-left:3px solid var(--azul);}
tr.eliminado td{opacity:0.4;}
tr:hover td{background:var(--violeta-claro);}
.pts{font-family:'Oswald',sans-serif;font-weight:700;color:var(--rosa);}
.pos-n{color:var(--lila);font-size:0.72rem;margin-right:5px;}
.forma{font-size:0.65rem;display:flex;gap:2px;justify-content:center;}
.forma span{width:14px;height:14px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:700;}
.forma .G{background:var(--rosa);color:#fff;}
.forma .E{background:var(--lila);color:#fff;}
.forma .P{background:#e0e0e0;color:#999;}

.bracket-scroll{overflow-x:auto;padding-bottom:10px;}
.bracket-tree{display:flex;gap:2px;min-width:860px;}
.bcol{display:flex;flex-direction:column;flex:1;min-width:150px;}
.bcol-titulo{font-family:'Oswald',sans-serif;font-size:0.62rem;letter-spacing:2px;color:var(--violeta);
  text-align:center;padding:6px 4px 8px;text-transform:uppercase;border-bottom:2px solid var(--gris2);margin-bottom:0;}
.bg-grid{display:grid;grid-template-rows:repeat(16,minmax(52px,1fr));flex:1;gap:2px;padding:2px;}
.bg-cell{display:flex;align-items:center;}
.bracket-fecha{font-size:0.58rem;color:var(--lila);text-align:center;padding-bottom:2px;letter-spacing:0.3px;}
.bracket-partido{background:var(--gris);border-radius:8px;border:1px solid var(--gris2);overflow:hidden;width:100%;}
.bracket-equipo{padding:5px 7px;font-size:0.74rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--gris2);color:var(--texto);}
.bracket-equipo:last-child{border-bottom:none;}
.beq-nombre{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bracket-equipo.ganador{color:var(--rosa);font-weight:700;}
.bracket-equipo.eliminado-b{opacity:0.3;}
.bracket-gol{font-family:'Oswald',sans-serif;font-size:0.85rem;font-weight:700;margin-left:4px;}
.bracket-btns{display:flex;justify-content:flex-end;gap:2px;}
.btn-bracket-edit{background:none;border:none;cursor:pointer;color:var(--lila);font-size:0.65rem;padding:1px 4px;}
.btn-bracket-edit:hover{color:var(--rosa);}
.btn-historial{background:none;border:none;cursor:pointer;color:var(--lila);font-size:0.65rem;padding:1px 4px;}
.btn-historial:hover{color:var(--naranja);}

.equipo-card{background:var(--gris);border-radius:10px;padding:12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px rgba(123,45,139,0.07);}
img.emoji{height:1em;width:1em;vertical-align:-0.1em;display:inline-block;}
/* PREDICCIONES */
.pred-intro{background:var(--gris);border-radius:10px;padding:10px 14px;font-size:0.78rem;color:var(--lila);margin:12px 0 8px;}
.pred-seccion{font-family:'Oswald',sans-serif;font-size:0.7rem;letter-spacing:2px;color:var(--violeta);text-transform:uppercase;padding:14px 4px 6px;border-bottom:2px solid var(--gris2);margin-bottom:6px;}
.pred-cruce{background:var(--gris);border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--gris2);}
.pred-cruce:has(.pred-gan){border-left-color:var(--rosa);}
.pred-fecha{font-size:0.62rem;color:var(--lila);margin-bottom:2px;}
.pred-ronda{background:var(--violeta);color:#fff;border-radius:4px;padding:1px 5px;font-size:0.58rem;margin-left:4px;}
.pred-vs{font-size:0.82rem;font-weight:600;color:var(--texto);margin:3px 0;}
.pred-sep{opacity:.3;margin:0 4px;}
.pred-estado{font-size:0.72rem;margin-top:3px;}
.pred-gan{color:var(--rosa);font-weight:600;}
.pred-pend{color:var(--lila);}
.pred-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:4px;}
.pred-card{background:var(--gris);border-radius:10px;padding:12px;border:1px solid var(--gris2);}
.pred-card-titulo{font-family:'Oswald',sans-serif;font-size:0.95rem;font-weight:600;color:var(--violeta);margin-bottom:2px;}
.pred-card-sub{font-size:0.6rem;color:var(--lila);margin-bottom:8px;}
.pred-paso{font-size:0.74rem;padding:4px 0;border-bottom:1px solid var(--gris2);color:var(--texto);}
.pred-paso:last-child{border-bottom:none;}
.pred-paso-r{font-family:'Oswald',sans-serif;font-size:0.68rem;color:var(--rosa);margin-right:4px;}
.pred-paso-f{font-size:0.62rem;color:var(--lila);margin-right:4px;}
.equipo-card .flag{font-size:1.8rem;}
.equipo-card .info{flex:1;}
.equipo-card .nombre{font-family:'Oswald',sans-serif;font-size:0.95rem;font-weight:600;color:var(--violeta);}
.equipo-card .sub{font-size:0.72rem;color:var(--lila);margin-top:2px;}
.equipo-card .pts-b{font-family:'Oswald',sans-serif;font-size:1.1rem;color:var(--rosa);font-weight:700;text-align:right;}
.equipo-card .pts-l{font-size:0.62rem;color:var(--lila);}
.btn-rm{background:none;border:none;cursor:pointer;color:var(--gris2);font-size:0.95rem;}
.btn-rm:hover{color:var(--rojo);}

.empty{text-align:center;padding:36px 16px;color:var(--lila);}
.empty .ic{font-size:2.2rem;margin-bottom:8px;}
.empty p{font-size:0.82rem;}

.badge{display:inline-block;font-size:0.62rem;padding:1px 6px;border-radius:4px;font-family:'Oswald',sans-serif;letter-spacing:1px;margin-left:6px;}
.badge.clasif{background:var(--rosa);color:#fff;}
.badge.playoff-b{background:var(--azul);color:#fff;}
.badge.elim{background:var(--gris2);color:var(--lila);}

.leyenda{display:flex;gap:12px;margin-top:10px;font-size:0.68rem;color:var(--lila);flex-wrap:wrap;}
.leyenda span{display:flex;align-items:center;gap:3px;}
.dot{width:7px;height:7px;border-radius:50%;}

.seccion-titulo{font-family:'Oswald',sans-serif;font-size:0.9rem;color:var(--violeta);margin:16px 0 8px;letter-spacing:1px;}
.info-box{background:var(--gris);border-radius:10px;padding:12px 14px;font-size:0.8rem;color:var(--lila);margin-bottom:8px;line-height:1.6;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dash-card{background:var(--gris);border-radius:10px;padding:12px 14px;border-left:3px solid var(--lila);box-shadow:0 1px 4px rgba(123,45,139,0.07);}
.dash-card.clickable{cursor:pointer;transition:background 0.15s,border-color 0.15s;}
.dash-card.clickable:hover{border-color:var(--rosa);background:var(--rosa-claro);}
.dash-card.clickable.open{border-color:var(--rosa);background:var(--violeta-claro);}
.clasif-panel,.elim-panel{display:none;margin-top:10px;background:var(--fondo);border-radius:10px;border:1.5px solid var(--lila);overflow:hidden;}
.clasif-panel.open,.elim-panel.open{display:block;}
.panel-fila{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--gris);font-size:0.8rem;}
.panel-fila:last-child{border-bottom:none;}
.panel-fila .pf-eq{flex:1;color:var(--texto);font-size:0.82rem;}
.panel-fila .pf-inst{font-size:0.68rem;color:var(--violeta);background:var(--violeta-claro);border-radius:5px;padding:2px 7px;white-space:nowrap;font-family:'Oswald',sans-serif;letter-spacing:0.3px;}
.panel-fila .pf-inst.elim-tag{background:#fdeaea;color:var(--rojo);}
.panel-fila .pf-fecha{font-size:0.62rem;color:var(--lila);margin-left:4px;white-space:nowrap;}
.dash-card.gold{border-left-color:var(--rosa);}
.dash-card.red{border-left-color:var(--rojo);}
.dash-card.blue{border-left-color:var(--azul);}
.dash-num{font-family:'Oswald',sans-serif;font-size:1.8rem;font-weight:700;color:var(--rosa);line-height:1;}
.dash-label{font-size:0.68rem;color:var(--lila);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.dash-partido{background:var(--gris);border-radius:8px;padding:8px 12px;margin-bottom:4px;display:flex;align-items:center;gap:8px;font-size:0.82rem;color:var(--texto);}
.dash-partido .dp-fecha{font-size:0.65rem;color:var(--lila);min-width:46px;}
.dash-partido .dp-eq{flex:1;}
.dash-partido .dp-res{font-family:'Oswald',sans-serif;font-size:0.9rem;color:var(--rosa);font-weight:700;}
.dash-partido.fav-p{border-left:3px solid var(--rosa);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gris2);font-size:0.8rem;color:var(--texto);}
.stat-row:last-child{border-bottom:none;}
.stat-val{font-family:'Oswald',sans-serif;color:var(--rosa);font-weight:700;}
.clasif-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.clasif-chip{background:var(--rosa-claro);border-radius:6px;padding:3px 8px;font-size:0.72rem;border-left:3px solid var(--rosa);color:var(--violeta);}
.clasif-chip.t{border-left-color:var(--azul);background:var(--violeta-claro);}
/* FAVORITOS SELECTOR */
.fav-selector{display:flex;flex-direction:column;gap:4px;}
.fav-selector-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--gris);
  border-radius:10px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.fav-selector-item.sel{border-color:var(--rosa);background:var(--rosa-claro);}
.fav-selector-item:hover{background:var(--violeta-claro);}
.fav-sel-flag{font-size:1.4rem;min-width:28px;}
.fav-sel-nombre{flex:1;font-size:0.88rem;font-weight:500;color:var(--texto);}
.fav-sel-grupo{font-size:0.68rem;color:var(--lila);font-family:'Oswald',sans-serif;}
.fav-sel-check{font-size:1rem;color:var(--rosa);font-weight:700;min-width:18px;text-align:center;}
/* BUSQUEDA */
.busqueda-bar{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.busqueda-bar input{flex:1;background:var(--gris);border:2px solid var(--gris2);border-radius:10px;
  padding:10px 14px;font-size:0.9rem;color:var(--texto);font-family:'Inter',sans-serif;outline:none;}
.busqueda-bar input:focus{border-color:var(--rosa);}
.busqueda-bar input::placeholder{color:var(--lila);}
.busqueda-bar .btn-buscar{background:linear-gradient(135deg,var(--violeta),var(--rosa));color:#fff;
  border:none;border-radius:10px;padding:10px 16px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:0.85rem;}
.pais-hero{background:linear-gradient(135deg,var(--violeta),var(--rosa));border-radius:14px;
  padding:16px;margin-bottom:12px;color:#fff;display:flex;align-items:center;gap:14px;}
.pais-hero .flag{font-size:3rem;}
.pais-hero .ph-info h2{font-family:'Oswald',sans-serif;font-size:1.3rem;letter-spacing:1px;}
.pais-hero .ph-info p{font-size:0.75rem;opacity:0.8;margin-top:2px;}
.pais-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px;}
.pais-stat{background:var(--gris);border-radius:10px;padding:10px 6px;text-align:center;}
.pais-stat .ps-num{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:700;color:var(--rosa);}
.pais-stat .ps-lbl{font-size:0.6rem;color:var(--lila);text-transform:uppercase;letter-spacing:0.5px;}
.sugerencias{background:var(--gris);border-radius:10px;overflow:hidden;margin-bottom:8px;}
.sugerencia-item{padding:10px 14px;font-size:0.85rem;cursor:pointer;border-bottom:1px solid var(--gris2);color:var(--texto);}
.sugerencia-item:last-child{border-bottom:none;}
.sugerencia-item:hover{background:var(--violeta-claro);}
/* DESPLEGABLE GRUPOS */
.grupo-block{margin-bottom:4px;}
.grupo-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 0 5px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:2px solid var(--gris2);text-align:left;}
.grupo-toggle-left{display:flex;align-items:center;gap:8px;}
.grupo-toggle-label{font-family:'Oswald',sans-serif;font-size:0.68rem;letter-spacing:2px;color:var(--violeta);text-transform:uppercase;}
.grupo-banderas{font-size:1rem;letter-spacing:1px;}

// ═══════════════════════════════════════════════════════════
// MOTOR FIFA — TABLA
// ═══════════════════════════════════════════════════════════
function calcTabla(grupo){
  const ps = E.partidos.filter(p=>p.grupo===grupo && p.gL!==null);
  const eq = {};
  GRUPOS_DEF[grupo].equipos.forEach(n=>{eq[n]={n,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0,hist:[]};});
  ps.forEach(p=>{
    const l=eq[p.local],v=eq[p.visitante];
    if(!l||!v)return;
    l.pj++;v.pj++;l.gf+=p.gL;l.gc+=p.gV;v.gf+=p.gV;v.gc+=p.gL;
    if(p.gL>p.gV){l.pg++;l.pts+=3;v.pp++;l.hist.push('G');v.hist.push('P');}
    else if(p.gL<p.gV){v.pg++;v.pts+=3;l.pp++;l.hist.push('P');v.hist.push('G');}
    else{l.pe++;v.pe++;l.pts++;v.pts++;l.hist.push('E');v.hist.push('E');}
  });
  // Criterios desempate FIFA: 1)pts 2)DG 3)GF 4)enfrentamiento directo pts 5)GD directo 6)GF directo
  const arr = Object.values(eq);
  arr.sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    if((b.gf-b.gc)!==(a.gf-a.gc)) return (b.gf-b.gc)-(a.gf-a.gc);
    if(b.gf!==a.gf) return b.gf-a.gf;
    // Enfrentamiento directo
    const ed = ps.filter(p=>(p.local===a.n&&p.visitante===b.n)||(p.local===b.n&&p.visitante===a.n));
    let ptA=0,ptB=0,gdA=0,gdB=0;
    ed.forEach(p=>{
      if(p.local===a.n){const d=p.gL-p.gV;gdA+=d;gdB-=d;if(p.gL>p.gV)ptA+=3;else if(p.gL<p.gV)ptB+=3;else{ptA++;ptB++;}}
      else{const d=p.gV-p.gL;gdA+=d;gdB-=d;if(p.gV>p.gL)ptA+=3;else if(p.gV<p.gL)ptB+=3;else{ptA++;ptB++;}}
    });
    if(ptB!==ptA) return ptB-ptA;
    return gdB-gdA;
  });
  return arr;
}

// Devuelve el clasificado 1° y 2° de cada grupo (proyección provisoria si el grupo no terminó)
function getClasificados(){
  const cl={};
  const prov={};
  for(const g of Object.keys(GRUPOS_DEF)){
    const ps = E.partidos.filter(p=>p.grupo===g);
    const jugados = ps.filter(p=>p.gL!==null).length;
    if(jugados===0) continue; // todavía no arrancó el grupo, no hay nada que proyectar
    const terminado = ps.every(p=>p.gL!==null);
    const t=calcTabla(g);
    cl['1°'+g]=t[0]?.n||null;
    cl['2°'+g]=t[1]?.n||null;
    cl['3°'+g]=t[2]?.n||null;
    if(!terminado){ prov['1°'+g]=true; prov['2°'+g]=true; prov['3°'+g]=true; }
  }
  cl.__prov = prov;
  return cl;
}

// Traduce una ref interna a texto descriptivo legible (para mostrar en bracket cuando aún no hay equipo)
function refLabel(ref){
  if(!ref) return '?';
  // Clasificados directos de grupos: "1°A", "2°B", "3°C"
  if(/^[123]°[A-L]$/.test(ref)){
    const pos=ref[0], g=ref.slice(2);
    return pos==='1'?`1° Gr.${g}` : pos==='2'?`2° Gr.${g}` : `3° Gr.${g}`;
  }
  // Mejor tercero: "M3-ABCDF"
  if(ref.startsWith('M3-')) return 'Mejor 3°';
  // Ganador de partido eliminatorio — resolver recursivamente
  if(ref.startsWith('G-')){
    const id=ref.slice(2);
    const cruce=TODAS_ELIM.find(c=>c.id===id);
    if(cruce) return `${refLabel(cruce.e1)} / ${refLabel(cruce.e2)}`;
    return '?';
  }
  // Perdedor de partido eliminatorio
  if(ref.startsWith('P-')){
    const id=ref.slice(2);
    const cruce=TODAS_ELIM.find(c=>c.id===id);
    if(cruce) return `Per. ${refLabel(cruce.e1)}·${refLabel(cruce.e2)}`;
    return '?';
  }
  return ref;
}

// ── MEJORES TERCEROS ──────────────────────────────────────
function getMejoresTerceros(){
  const grupos = Object.keys(GRUPOS_DEF);
  const terceros = [];
  for(const g of grupos){
    const ps = E.partidos.filter(p=>p.grupo===g);
    if(ps.filter(p=>p.gL!==null).length === 0) continue;
    const t = calcTabla(g);
    if(t.length < 3) continue;
    const eq = t[2];
    terceros.push({ eq: eq.n, g, pts: eq.pts, dg: eq.gf-eq.gc, gf: eq.gf });
  }
  terceros.sort((a,b)=> b.pts-a.pts || b.dg-a.dg || b.gf-a.gf);
  const top8 = terceros.slice(0,8);
  const slots = ['D2','D5','D7','D8','D9','D10','D13','D15'];
  const resultado = {};
  top8.forEach((t, i) => { resultado[slots[i]] = { eq: t.eq }; });
  return resultado;
}

// Resuelve qué equipo juega en un cruce de eliminatorias
function resolverEquipo(ref, clasif, elimRes){
  if(!ref) return null;
  if(clasif[ref]) return clasif[ref];
  if(ref.startsWith('G-')){
    const id=ref.slice(2);
    return elimRes[id]?.ganador||null;
  }
  if(ref.startsWith('P-')){
    const id=ref.slice(2);
    return elimRes[id]?.perdedor||null;
  }
  if(ref.startsWith('M3-')){
    // El slot está en el ID del cruce que contiene este ref
    // Se resuelve via getMejoresTerceros() usando el cruceId
    return null; // se resuelve en getElimResuelto
  }
  return ref;
}

function getElimResuelto(){
  const clasif = getClasificados();
  const m3 = getMejoresTerceros(); // { D2: {eq,prov}, D5: {eq,prov}, ... }
  const res = {};
  const allCruces = TODAS_ELIM;
  allCruces.forEach(c=>{
    // Resolver M3 para este cruce específico
    function resolverConM3(ref){
      if(!ref) return null;
      if(ref.startsWith('M3-')){
        const m = m3[c.id];
        if(!m) return null;
        return m.eq;
      }
      return resolverEquipo(ref, clasif, res);
    }
    const e1 = resolverConM3(c.e1);
    const e2 = resolverConM3(c.e2);
    const r = E.elim[c.id];
    let ganador=null,perdedor=null;
    if(r&&r.gL!==null&&r.gV!==null&&e1&&e2){
      const e1s=e1.replace(' (prov.)',''), e2s=e2.replace(' (prov.)','');
      ganador = r.gL>r.gV ? e1s : r.gL<r.gV ? e2s : null;
      perdedor = r.gL>r.gV ? e2s : r.gL<r.gV ? e1s : null;
    }
    res[c.id]={e1,e2,gL:r?.gL??null,gV:r?.gV??null,ganador,perdedor};
  });
  return res;
}

function abrirModalElim(id){
  const er = getElimResuelto();
  const c = er[id];
  if(!c.e1||!c.e2){alert('Aún no se conocen los equipos de este partido.');return;}
  modalCtx = {tipo:'elim', id};
  const label = TODAS_ELIM.find(x=>x.id===id)?.label||id;
  document.getElementById('modal-titulo').textContent = label;
  document.getElementById('modal-info').textContent = c.e1 + ' vs ' + c.e2;
  document.getElementById('modal-local-lbl').textContent = c.e1;
  document.getElementById('modal-visit-lbl').textContent = c.e2;
  document.getElementById('modal-gL').value = c.gL??0;
  document.getElementById('modal-gV').value = c.gV??0;
  document.getElementById('modal').classList.add('open');
}

function cerrarModal(){ document.getElementById('modal').classList.remove('open'); modalCtx=null; }

function guardarResultado(){
  const gL = parseInt(document.getElementById('modal-gL').value)||0;
  const gV = parseInt(document.getElementById('modal-gV').value)||0;
  if(gL===gV && modalCtx.tipo==='elim'){
    if(!confirm('En eliminatorias no puede haber empate (se decide por penales). ¿Continuar? Ingresá el marcador de penales.')){return;}
  }
  if(modalCtx.tipo==='grupo'){
    const p = E.partidos.find(x=>x.id===modalCtx.id);
    p.gL=gL; p.gV=gV;
  } else {
    E.elim[modalCtx.id]={gL,gV};
  }
  guardar(); cerrarModal(); renderAll();
}

function limpiarResultado(){
  if(modalCtx.tipo==='grupo'){
    const p = E.partidos.find(x=>x.id===modalCtx.id);
    p.gL=null; p.gV=null;
  } else {
    delete E.elim[modalCtx.id];
  }
  guardar(); cerrarModal(); renderAll();
}

function historialTooltipHTML(eqLocal, eqVisitante){
  const h = HISTORIAL_MUNDIAL[parClave(eqLocal, eqVisitante)];
  let filas;
  if(h && h.mundiales.length){
    filas = h.mundiales.map(m=>`<div class="hist-fila">
        <span class="hist-anio">${m.anio}</span>
        <span class="hist-inst">${m.instancia}</span>
        <span class="hist-res">${m.resultado}</span>
      </div>`).join('');
  } else {
    filas = `<div class="hist-vacio">⚪ Sin enfrentamientos en Copas del Mundo entre 1990 y 2022.</div>`;
  }
  const extra = h && h.extra ? `<div class="hist-extra">ℹ️ ${h.extra}</div>` : '';
  return `<div class="hist-rival">${eqLocal} vs ${eqVisitante}</div>${filas}${extra}`;
}
function toggleHistorial(id){
  const el = document.getElementById('hist-'+id);
  if(!el) return;
  const abierto = el.classList.contains('open');
  document.querySelectorAll('.historial-tooltip.open').forEach(t=>t.classList.remove('open'));
  if(!abierto) el.classList.add('open');
}
document.addEventListener('click', e=>{
  if(!e.target.closest('.historial-row')){
    document.querySelectorAll('.historial-tooltip.open').forEach(t=>t.classList.remove('open'));
  }
});

function renderFixture(){
  let html='';
  for(const g of Object.keys(GRUPOS_DEF)){
    const jugados=E.partidos.filter(p=>p.grupo===g&&p.gL!==null).length;
    const total=E.partidos.filter(p=>p.grupo===g).length;
    let partidos='';

      const res=p.gL!==null
        ?`<span class="resultado">${p.gL}&nbsp;-&nbsp;${p.gV}</span>`

      const historialBloque = tieneHistorial ? `

        <div class="partido-row">
          <div class="fecha-hora">${p.fecha}<br>${p.hora||''}</div>

          <button class="btn-edit" onclick="abrirModalGrupo('${p.id}')">✏️</button>

        ${historialBloque}

    });
    const abierto = false; // siempre cerrado por defecto
    html+=`<div class="grupo-block">
      <button class="grupo-toggle" onclick="toggleGrupo('${g}')">

          <span class="grupo-toggle-label">▸ GRUPO ${g}</span>

      <div class="grupo-body${abierto?' open':''}" id="body-${g}">${partidos}</div>
    </div>`;
  }
  document.getElementById('tab-fixture').innerHTML=html;
}

function renderTabla(){
  let html='<div class="tabla-wrap">';
  for(const g of Object.keys(GRUPOS_DEF)){
    const tabla=calcTabla(g);
    const totalPartidos = E.partidos.filter(p=>p.grupo===g).length;
    const jugados = E.partidos.filter(p=>p.grupo===g&&p.gL!==null).length;
    const completo = jugados===totalPartidos;
    html+=`<button class="grupo-toggle" onclick="toggleGrupoTabla('${g}')" style="margin-top:10px">
      <div class="grupo-toggle-left">
        <span class="grupo-toggle-label">▸ GRUPO ${g}</span>
        <span class="grupo-banderas">${banderas(g)}</span>
        <span style="font-size:0.62rem;color:var(--lila)">${jugados}/${totalPartidos}</span>
      </div>
      <span class="grupo-arrow" id="tarrow-${g}">▼</span>
    </button>
    <div class="grupo-body" id="tbody-${g}"><table><thead><tr><th colspan="2">EQUIPO</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>GF</th><th>GC</th><th>DG</th><th>PTS</th><th>FORMA</th></tr></thead><tbody>`;
    tabla.forEach((eq,i)=>{
      const cls = completo&&i<2?'clasif':completo&&i===2?'playoff':completo&&i===3?'eliminado':'';
      const badge = completo&&i<2?'<span class="badge clasif">CLASIF</span>':completo&&i===2?'<span class="badge playoff-b">PLAYOFF</span>':completo&&i===3?'<span class="badge elim">ELIM</span>':'';
      const forma = eq.hist.slice(-5).map(h=>`<span class="${h}">${h}</span>`).join('');
      html+=`<tr class="${cls}"><td><span class="pos-n">${i+1}</span>${eq.n}${badge}</td><td></td>
        <td>${eq.pj}</td><td>${eq.pg}</td><td>${eq.pe}</td><td>${eq.pp}</td>
        <td>${eq.gf}</td><td>${eq.gc}</td><td>${eq.gf-eq.gc>0?'+':''}${eq.gf-eq.gc}</td>
        <td class="pts">${eq.pts}</td><td><div class="forma">${forma}</div></td></tr>`;
    });
    html+='</tbody></table></div>';
  }
  html+='</div><div class="leyenda"><span><span class="dot" style="background:#27ae60"></span>Clasifica</span><span><span class="dot" style="background:var(--azul)"></span>Playoff 3ros</span><span><span class="dot" style="background:var(--gris2)"></span>Eliminado</span></div>';
  document.getElementById('tab-tabla').innerHTML=html;
}

function renderBracket(){
  const er = getElimResuelto();

  // Unidad de fila: 16 filas totales (una por partido de 16avos)
  // Cada columna usa CSS grid con 16 filas iguales
  // 16avos: cada partido ocupa 1 fila
  // Octavos: cada partido ocupa 2 filas (centrado entre sus 2 de 16avos)
  // Cuartos: 4 filas; Semis: 8 filas; Final: 8 filas; 3P: 8 filas

  // Orden de filas según llave FIFA:
  // fila 1: D2, fila 2: D5  → O1 filas 1-2
  // fila 3: D1, fila 4: D3  → O2 filas 3-4  → C1 filas 1-4
  // fila 5: D11,fila 6: D12 → O3 filas 5-6
  // fila 7: D9, fila 8: D10 → O4 filas 7-8  → C2 filas 5-8  → S1 filas 1-8
  // fila 9: D4, fila 10:D6  → O5 filas 9-10
  // fila 11:D7, fila 12:D8  → O6 filas 11-12 → C3 filas 9-12
  // fila 13:D14,fila 14:D16 → O7 filas 13-14
  // fila 15:D13,fila 16:D15 → O8 filas 15-16 → C4 filas 13-16 → S2 filas 9-16

  const D=id=>CRUCES_D16.find(c=>c.id===id);
  const O=id=>CRUCES_OCTAVOS_DEF.find(c=>c.id===id);
  const C=id=>CRUCES_CUARTOS_DEF.find(c=>c.id===id);
  const S=id=>CRUCES_SEMI_DEF.find(c=>c.id===id);
  const GF=CRUCES_FINAL_DEF.find(c=>c.id==='GF');
  const TP=CRUCES_FINAL_DEF.find(c=>c.id==='3P');

  function pb(c){
    const d=er[c.id];
    const e1=d?.e1||'A definir', e2=d?.e2||'A definir';
    const gL=d?.gL, gV=d?.gV, pend=gL===null;
    const g1=d?.ganador===e1, g2=d?.ganador===e2;
    const fechaHora = c.hora ? `${c.fecha} · ${c.hora}` : c.fecha||'';
    const ambosDefinidos = e1!=='A definir' && e2!=='A definir';
    const e1clean = e1.replace(' (prov.)','');
    const e2clean = e2.replace(' (prov.)','');
    return `<div class="bracket-partido">
      ${fechaHora?`<div class="bracket-fecha">${fechaHora}</div>`:''}
      <div class="bracket-equipo${g1?' ganador':g2?' eliminado-b':''}">
        <span class="beq-nombre">${e1}</span><span class="bracket-gol">${pend?'':gL}</span>
      </div>
      <div class="bracket-equipo${g2?' ganador':g1?' eliminado-b':''}">
        <span class="beq-nombre">${e2}</span><span class="bracket-gol">${pend?'':gV}</span>
      </div>
      <div class="bracket-btns">
        <button class="btn-bracket-edit" onclick="abrirModalElim('${c.id}')">✏️</button>
        ${ambosDefinidos?`<button class="btn-historial" onclick="abrirHistorial('${e1clean}','${e2clean}')">📖</button>`:''}
      </div>
    </div>`;
  }

  // Genera una celda de grid posicionada
  function gc(c, rowStart, rowSpan){
    return `<div class="bg-cell" style="grid-row:${rowStart}/span ${rowSpan}">${pb(c)}</div>`;
  }

  // Orden exacto según Google/FIFA:
  // Filas 1-2 → O2(Houston): D1(2°A/2°B) + D3(1°F/2°C)
  // Filas 3-4 → O1(Filadelfia): D2(1°E/M3) + D5(1°I/M3)
  // Filas 5-6 → O4(Seattle): D10(1°G/M3) + D9(1°D/M3)
  // Filas 7-8 → O3(Dallas): D12(1°H/2°J) + D11(2°K/2°L)
  // Filas 9-10 → O5(NJ): D4(1°C/2°F) + D6(2°E/2°I)
  // Filas 11-12 → O6(Azteca): D7(1°A/M3) + D8(1°L/M3)
  // Filas 13-14 → O8(Vancouver): D13(1°B/M3) + D15(1°K/M3)
  // Filas 15-16 → O7(Atlanta): D16(2°D/2°G) + D14(1°J/2°H)

  const col16 =
    gc(D('D1'), 1,1) + gc(D('D3'), 2,1) +
    gc(D('D2'), 3,1) + gc(D('D5'), 4,1) +
    gc(D('D10'),5,1) + gc(D('D9'), 6,1) +
    gc(D('D12'),7,1) + gc(D('D11'),8,1) +
    gc(D('D4'), 9,1) + gc(D('D6'),10,1) +
    gc(D('D7'),11,1) + gc(D('D8'),12,1) +
    gc(D('D13'),13,1)+ gc(D('D15'),14,1)+
    gc(D('D16'),15,1)+ gc(D('D14'),16,1);

  // Octavos: cada par de 16avos → su octavo
  const colO =
    gc(O('O2'),1,2) + gc(O('O1'),3,2) +
    gc(O('O4'),5,2) + gc(O('O3'),7,2) +
    gc(O('O5'),9,2) + gc(O('O6'),11,2)+
    gc(O('O8'),13,2)+ gc(O('O7'),15,2);

  // Cuartos: C1=O2+O1, C2=O4+O3, C3=O5+O6, C4=O8+O7
  const colC =
    gc(C('C1'),1,4) + gc(C('C2'),5,4) +
    gc(C('C3'),9,4) + gc(C('C4'),13,4);

  const colS =
    gc(S('S1'),1,8) + gc(S('S2'),9,8);

  const colF =
    gc(GF,1,8) + gc(TP,9,8);

  function renderCol(titulo, inner){
    return `<div class="bcol">
      <div class="bcol-titulo">${titulo}</div>
      <div class="bg-grid">${inner}</div>
    </div>`;
  }

  const html=`<div class="info-box" style="font-size:0.75rem">✏️ Tocá el lápiz para cargar resultados · Los cruces se actualizan automáticamente</div>
  <div class="bracket-scroll">
    <div class="bracket-tree">
      ${renderCol('16AVOS', col16)}
      ${renderCol('OCTAVOS', colO)}
      ${renderCol('CUARTOS', colC)}
      ${renderCol('SEMIS', colS)}
      ${renderCol('FINAL / 3°P', colF)}
    </div>
  </div>`;
  document.getElementById('tab-bracket').innerHTML=html;
}

function renderSelectorFavoritos(){
  const todos = [];
  for(const [g,d] of Object.entries(GRUPOS_DEF))
    d.equipos.forEach(eq=>todos.push({eq,g}));

  const items = todos.map(({eq,g})=>{
    const sel = E.favoritos.includes(eq);
    const flag=eq.split(' ')[0], nombre=eq.split(' ').slice(1).join(' ');
    return `<div class="fav-selector-item${sel?' sel':''}" onclick="toggleFavEq('${eq}');renderFavoritos()">
      <span class="fav-sel-flag">${flag}</span>
      <span class="fav-sel-nombre">${nombre}</span>
      <span class="fav-sel-grupo">Gr.${g}</span>
      <span class="fav-sel-check">${sel?'✓':''}</span>
    </div>`;
  }).join('');

  document.getElementById('tab-favoritos').innerHTML=`
    <div class="seccion-titulo" style="margin-top:0">Elegí tus selecciones favoritas</div>
    <div class="info-box" style="margin-bottom:10px">Tocá una selección para marcarla. Se guarda en tu dispositivo.</div>
    <div class="fav-selector">${items}</div>
    <div style="text-align:center;margin-top:12px">
      <button class="btn-ok" onclick="renderFavoritos()">Listo ✓</button>
    </div>`;
  if(window.twemoji) twemoji.parse(document.getElementById('tab-favoritos'),{folder:'svg',ext:'.svg',base:'https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/'});
}

function renderFavoritos(){
  let html=`<div style="text-align:right;margin-bottom:10px">
    <button class="btn-ok" onclick="renderSelectorFavoritos()" style="font-size:0.78rem;padding:7px 12px">⭐ Elegí tus favoritos</button>
  </div>`;

  if(!E.favoritos.length){
    html+=`<div class="empty"><div class="ic">⭐</div><p>Todavía no elegiste favoritos.<br>Tocá el botón de arriba para empezar.</p></div>`;
    document.getElementById('tab-favoritos').innerHTML=html;
    return;
  }

  E.favoritos.forEach(eq=>{
    let grupo='-',pos=1,pts=0;
    for(const [g,d] of Object.entries(GRUPOS_DEF)){
      if(d.equipos.includes(eq)){
        grupo=g;
        const t=calcTabla(g);
        const i=t.findIndex(x=>x.n===eq);
        if(i>=0){pos=i+1;pts=t[i].pts;}
        break;
      }
    }
    const proxP=E.partidos.find(x=>(x.local===eq||x.visitante===eq)&&x.gL===null);
    const prox=proxP?`${proxP.fecha} · ${proxP.hora} vs ${(proxP.local===eq?proxP.visitante:proxP.local).split(' ').slice(1).join(' ')}`:'Fase de grupos completada';
    const flag=eq.split(' ')[0], nombre=eq.split(' ').slice(1).join(' ');
    html+=`<div class="equipo-card">
      <div class="flag">${flag}</div>
      <div class="info"><div class="nombre">${nombre}</div><div class="sub">Grupo ${grupo} · Pos ${pos} · ${prox}</div></div>
      <div><div class="pts-b">${pts}</div><div class="pts-l">PTS</div></div>
      <button class="btn-rm" onclick="removeFav('${eq}');renderFavoritos()">✕</button>
    </div>`;
  });
  document.getElementById('tab-favoritos').innerHTML=html;
  if(window.twemoji) twemoji.parse(document.getElementById('tab-favoritos'),{folder:'svg',ext:'.svg',base:'https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/'});
}

// UTILS
// ═══════════════════════════════════════════════════════════
function togglePanel(tipo){
  const panel = document.getElementById('panel-'+tipo);
  const card  = document.getElementById('card-'+tipo);
  if(!panel||!card) return;
  const open = panel.classList.contains('open');
  // cerrar ambos primero
  document.querySelectorAll('.clasif-panel,.elim-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('#card-clasif,#card-elim').forEach(c=>c.classList.remove('open'));
  if(!open){
    panel.classList.add('open');
    card.classList.add('open');
  }
}

function toggleFavEq(eq){
  const i=E.favoritos.indexOf(eq);
  if(i>=0) E.favoritos.splice(i,1);
  else E.favoritos.push(eq);
  guardarFavs(); renderAll();
}
function toggleFav(local, visitante){
  // mantener compatibilidad: toggle solo el equipo clickeado — ahora se llama desde ⭐ del partido
  // pero el ⭐ de cada equipo usa toggleFavEq directamente
  toggleFavEq(local); // legacy — el btn del partido alterna local
}
function removeFav(eq){ E.favoritos=E.favoritos.filter(f=>f!==eq); guardarFavs(); renderAll(); }

function showTab(tab,btn){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
  tabActual=tab;
  renderTab(tab);
}
function renderTab(tab){
  if(tab==='inicio') renderDashboard();
  else if(tab==='fixture') renderFixture();
  else if(tab==='tabla') renderTabla();
  else if(tab==='bracket') renderBracket();
  else if(tab==='calendario') renderCalendario();
  else if(tab==='favoritos') renderFavoritos();
  else if(tab==='predicciones') renderPredicciones();
  else if(tab==='ayuda') renderAyuda();
  else if(tab==='busqueda') renderBusqueda();
  // Twemoji siempre después del render para que procese el HTML nuevo
  if(window.twemoji) twemoji.parse(document.body,{folder:'svg',ext:'.svg',base:'https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/'});
}
function renderAll(){
  renderTab(tabActual);
}

function diaLabel(iso){
  const d=new Date(iso.slice(0,10)+'T12:00:00');
  return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'numeric'});
}

// CALENDARIO
// ═══════════════════════════════════════════════════════════
function renderCalendario(){
  const er = getElimResuelto();

  // Partidos de grupos pendientes
  const pendGrupos = E.partidos
    .filter(p=>p.gL===null)
    .sort((a,b)=>a.iso.localeCompare(b.iso));

  // Partidos eliminatorios (todas las rondas), con fecha y hora conocidas
  const pendElim = TODAS_ELIM
    .filter(c=>c.iso && !er[c.id]?.ganador)
    .map(c=>{
      const d = er[c.id];
      return {
        tipo:'elim',
        id:c.id,
        label:c.label,
        fecha:c.fecha||'',
        hora:c.hora||'',
        iso:c.iso||'',
        estadio:c.estadio||'',
        e1:d?.e1||c.e1,
        e2:d?.e2||c.e2,
        ronda:c.r
      };
    })
    .sort((a,b)=>a.iso.localeCompare(b.iso));

  const todos = [
    ...pendGrupos.map(p=>({tipo:'grupo',...p})),
    ...pendElim
  ].sort((a,b)=>(a.iso||'').localeCompare(b.iso||''));

  if(!todos.length){
    document.getElementById('tab-calendario').innerHTML=`<div class="empty"><div class="ic">📅</div><p>Todos los partidos han sido jugados</p></div>`;
    return;
  }

  let html='', fechaActual='';
  todos.forEach(p=>{
    const fechaIso = p.iso?p.iso.slice(0,10):'';
    if(p.fecha!==fechaActual){
      fechaActual=p.fecha;
      if(fechaIso) html+=`<div class="seccion-titulo">📅 ${diaLabel(fechaIso)}</div>`;
    }
    if(p.tipo==='grupo'){
      const fav=E.favoritos.includes(p.local)||E.favoritos.includes(p.visitante);
      html+=`<div class="dash-partido${fav?' fav-p':''}">
        <div style="min-width:44px;font-size:0.68rem;color:var(--lila);line-height:1.4">${p.hora}<br><span style="font-size:0.6rem;opacity:.7">Gr.${p.grupo}</span></div>
        <div style="flex:1"><div><b>${p.local}</b> <span style="opacity:.4">vs</span> <b>${p.visitante}</b></div><div style="font-size:0.65rem;color:var(--lila);margin-top:2px">🏟 ${p.estadio||''}</div></div>
        <div style="font-size:0.62rem;color:var(--gris2);text-align:right">${p.horaLocal||''}</div>
      </div>`;
    } else {
      const horaStr = p.hora || '–';
      const esFav = E.favoritos.some(f=>p.e1.includes(f.split(' ').slice(1).join(' '))||p.e2.includes(f.split(' ').slice(1).join(' ')));
      html+=`<div class="dash-partido${esFav?' fav-p':''}">
        <div style="min-width:44px;font-size:0.68rem;color:var(--lila);line-height:1.4">${horaStr}<br><span style="font-size:0.6rem;opacity:.7">${p.ronda}</span></div>
        <div style="flex:1"><div><b>${p.e1}</b> <span style="opacity:.4">vs</span> <b>${p.e2}</b></div><div style="font-size:0.65rem;color:var(--lila);margin-top:2px">🏟 ${p.estadio}</div></div>
      </div>`;
    }
  });
  document.getElementById('tab-calendario').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDashboard(){
  const jugados = E.partidos.filter(p=>p.gL!==null);
  const pendientes = E.partidos.filter(p=>p.gL===null);
  const totalGrupos = Object.keys(GRUPOS_DEF).length;

  // Clasificados y eliminados
  let clasificados=[], eliminados=[], mejoresTerceros=[];
  for(const g of Object.keys(GRUPOS_DEF)){
    const ps = E.partidos.filter(p=>p.grupo===g);
    const completo = ps.every(p=>p.gL!==null);
    if(completo){
      const t=calcTabla(g);
      clasificados.push({eq:t[0].n,g,pos:1});
      clasificados.push({eq:t[1].n,g,pos:2});
      mejoresTerceros.push({eq:t[2].n,g,pts:t[2].pts,dg:t[2].gf-t[2].gc,gf:t[2].gf});
      eliminados.push(t[3].n);
    }
  }
  mejoresTerceros.sort((a,b)=>b.pts-a.pts||(b.dg-a.dg)||(b.gf-a.gf));
  const top8t = mejoresTerceros.slice(0,8);

  // Stats globales
  const statsEq={};
  for(const g of Object.keys(GRUPOS_DEF))
    GRUPOS_DEF[g].equipos.forEach(eq=>{statsEq[eq]={gf:0,gc:0,pg:0};});
  jugados.forEach(p=>{
    if(statsEq[p.local]){statsEq[p.local].gf+=p.gL;statsEq[p.local].gc+=p.gV;if(p.gL>p.gV)statsEq[p.local].pg++;}
    if(statsEq[p.visitante]){statsEq[p.visitante].gf+=p.gV;statsEq[p.visitante].gc+=p.gL;if(p.gV>p.gL)statsEq[p.visitante].pg++;}
  });
  const arr=Object.entries(statsEq).filter(([,v])=>v.gf>0||v.gc>0||v.pg>0);
  const maxGF = arr.length?arr.reduce((a,b)=>b[1].gf>a[1].gf?b:a,arr[0]):null;
  const minGC = arr.length?arr.filter(([,v])=>v.gc>=0).reduce((a,b)=>b[1].gc<a[1].gc?b:a,arr[0]):null;
  const maxDG = arr.length?arr.reduce((a,b)=>(b[1].gf-b[1].gc)>(a[1].gf-a[1].gc)?b:a,arr[0]):null;
  const maxPG = arr.length?arr.reduce((a,b)=>b[1].pg>a[1].pg?b:a,arr[0]):null;

  // Próximos 5
  const prox5 = pendientes.slice(0,5);
  // Últimos 5
  const ult5 = jugados.slice(-5).reverse();
  // Favoritos pendientes
  const favProx = pendientes.filter(p=>E.favoritos.includes(p.local)||E.favoritos.includes(p.visitante)).slice(0,3);
  const favRecientes = jugados.filter(p=>E.favoritos.includes(p.local)||E.favoritos.includes(p.visitante)).slice(-3).reverse();

  // Próximos partidos (grupos + eliminatorias)
  const er = getElimResuelto();
  const elimPendientes = TODAS_ELIM
    .map(c=>({ ...c, ...er[c.id] }))
    .filter(c=>c.gL===null && c.e1 && c.e2)
    .sort((a,b)=>new Date(a.iso)-new Date(b.iso));

  const proxElim = elimPendientes[0]||null;

  // Próximo partido de Argentina
  const argNombre = 'Argentina';
  const proxArg = elimPendientes.find(c=>(c.e1||'').includes(argNombre)||(c.e2||'').includes(argNombre))||null;

  // Bracket resumido: primeros 4 octavos
  const d16Resumen = [er['O1'],er['O2'],er['O3'],er['O4']].filter(x=>x&&x.e1&&x.e2);

  function dpHTML(p, showRes){
    const fav=E.favoritos.includes(p.local)||E.favoritos.includes(p.visitante);
    const res=showRes&&p.gL!==null?`<span class="dp-res">${p.gL}-${p.gV}</span>`:'';
    const fechaStr=p.iso?diaLabel(p.iso):(p.fecha||'');
    return `<div class="dash-partido${fav?' fav-p':''}">
      <span class="dp-fecha">${fechaStr}</span>
      <span class="dp-eq">${p.local||p.e1} <span style="opacity:.3">vs</span> ${p.visitante||p.e2}</span>
      ${res}
    </div>`;
  }

  // ── helpers para instancia ──
  function instanciaClasif(eq){
    const er2 = getElimResuelto();
    // Buscar en todas las rondas elim qué cruce tiene este equipo
    for(const c of TODAS_ELIM){
      const d = er2[c.id];
      if(!d) continue;
      const nombre = eq.split(' ').slice(1).join(' ');
      if((d.e1||'').includes(nombre)||(d.e2||'').includes(nombre)){
        if(!d.ganador){
          // próximo partido
          const fecha = c.fecha ? ` · ${c.fecha}` : '';
          return {ronda:c.r, fecha};
        } else if(d.ganador && !d.ganador.includes(nombre)){
          // perdió en esta ronda
          return {ronda:c.r, eliminado:true};
        }
      }
    }
    // Está clasificado pero aún no tiene cruce asignado
    return {ronda:'16avos', fecha:''};
  }

  let html=`
  <div class="dash-grid">
    <div class="dash-card gold"><div class="dash-num">${jugados.length}</div><div class="dash-label">Partidos jugados</div></div>
    <div class="dash-card"><div class="dash-num">${pendientes.length}</div><div class="dash-label">Pendientes</div></div>
    <div class="dash-card blue clickable${clasificados.length||top8t.length?' ':' disabled'}" id="card-clasif" onclick="togglePanel('clasif')">
      <div class="dash-num">${clasificados.length + top8t.length}</div>
      <div class="dash-label">Clasificados ${clasificados.length?'▾':''}</div>
    </div>
    <div class="dash-card red clickable${eliminados.length?' ':' disabled'}" id="card-elim" onclick="togglePanel('elim')">
      <div class="dash-num">${eliminados.length}</div>
      <div class="dash-label">Eliminados ${eliminados.length?'▾':''}</div>
    </div>
  </div>
  <div class="clasif-panel" id="panel-clasif">${(() => {
    if(!clasificados.length && !top8t.length) return '<div class="panel-fila">Sin clasificados aún</div>';
    let rows='';
    [...clasificados,...top8t].forEach(c=>{
      const inst = instanciaClasif(c.eq);
      const tag = inst.eliminado
        ? `<span class="pf-inst elim-tag">Eliminado en ${inst.ronda}</span>`
        : `<span class="pf-inst">${inst.ronda}${inst.fecha}</span>`;
      rows+=`<div class="panel-fila"><span class="pf-eq">${c.eq}</span>${tag}</div>`;
    });
    return rows;
  })()}</div>
  <div class="elim-panel" id="panel-elim">${(() => {
    if(!eliminados.length) return '<div class="panel-fila">Sin eliminados aún</div>';
    return eliminados.map(eq=>{
      // Buscar en qué grupo quedó 4°
      let grupo='';
      for(const [g,d] of Object.entries(GRUPOS_DEF)){
        if(d.equipos.includes(eq)){ grupo=g; break; }
      }
      return `<div class="panel-fila"><span class="pf-eq">${eq}</span><span class="pf-inst elim-tag">Eliminado · Grupo ${grupo}</span></div>`;
    }).join('');
  })()}</div>`;

  // Próximo partido general
  html+=`<div class="seccion-titulo">📅 Próximo partido</div>`;
  if(prox5.length){
    html+=prox5.slice(0,1).map(p=>dpHTML(p,false)).join('');
  } else if(proxElim){
    const inst = proxElim.r||'Eliminatoria';
    html+=`<div class="dash-partido">
      <span class="dp-fecha">${proxElim.fecha||''} · ${proxElim.hora||''} <span style="font-size:0.65em;opacity:.6">${inst}</span></span>
      <span class="dp-eq">${proxElim.e1} <span style="opacity:.3">vs</span> ${proxElim.e2}</span>
    </div>`;
  } else {
    html+=`<div class="info-box">No hay partidos pendientes</div>`;
  }

  // Próximo partido de Argentina
  html+=`<div class="seccion-titulo">🩵 Próximo partido de Argentina</div>`;
  if(proxArg){
    const inst = proxArg.r||'Eliminatoria';
    html+=`<div class="dash-partido fav-p">
      <span class="dp-fecha">${proxArg.fecha||''} · ${proxArg.hora||''} <span style="font-size:0.65em;opacity:.6">${inst}</span></span>
      <span class="dp-eq">${proxArg.e1} <span style="opacity:.3">vs</span> ${proxArg.e2}</span>
    </div>`;
  } else {
    // Buscar si Argentina ya jugó y perdió
    const argElim = TODAS_ELIM.map(c=>({...c,...er[c.id]}))
      .find(c=>c.ganador&&((c.e1||'').includes(argNombre)||(c.e2||'').includes(argNombre))&&!c.ganador.includes(argNombre));
    if(argElim){
      html+=`<div class="info-box">🇦🇷 Argentina eliminada en ${argElim.r}</div>`;
    } else {
      html+=`<div class="info-box">Sin próximos partidos de Argentina</div>`;
    }
  }

  // Últimos resultados
  html+=`<div class="seccion-titulo">🏁 Últimos resultados</div>`;
  html+=ult5.length?ult5.map(p=>dpHTML(p,true)).join(''):`<div class="info-box">Sin resultados cargados aún</div>`;

  // Favoritos
  if(E.favoritos.length){
    html+=`<div class="seccion-titulo">⭐ Tus favoritos</div>`;
    if(favProx.length) html+=favProx.map(p=>dpHTML(p,false)).join('');
    if(favRecientes.length) html+=favRecientes.map(p=>dpHTML(p,true)).join('');
    if(!favProx.length&&!favRecientes.length) html+=`<div class="info-box">Sin partidos recientes ni próximos de tus favoritos</div>`;
  }

  // Bracket resumido: primeros 4 octavos
  if(d16Resumen.length){
    html+=`<div class="seccion-titulo">🔮 Bracket proyectado (octavos)</div>`;
    d16Resumen.forEach(c=>{
      html+=`<div class="dash-partido"><span class="dp-eq">${c.e1} <span style="opacity:.3">vs</span> ${c.e2}</span>${c.ganador?`<span class="dp-res" style="font-size:0.7rem">→ ${c.ganador.split(' ').slice(1).join(' ')}</span>`:''}</div>`;
    });
  }

  document.getElementById('tab-inicio').innerHTML=html;
}

// ═══════════════════════════════════════════════════════════
// BUSQUEDA POR PAIS
// ═══════════════════════════════════════════════════════════
function todosLosEquipos(){
  const eq=new Set();
  Object.values(GRUPOS_DEF).forEach(g=>g.equipos.forEach(e=>eq.add(e)));
  return [...eq].sort((a,b)=>a.split(' ').slice(1).join(' ').localeCompare(b.split(' ').slice(1).join(' ')));
}

function buscarPais(query){
  if(!query||query.length<2) return null;
  const q=query.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
  return todosLosEquipos().find(e=>{
    const nombre=e.split(' ').slice(1).join(' ').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
    return nombre.includes(q);
  });
}

function renderPais(eq){
  const flag=eq.split(' ')[0];
  const nombre=eq.split(' ').slice(1).join(' ');
  let grupo='-';
  for(const [g,d] of Object.entries(GRUPOS_DEF)){
    if(d.equipos.includes(eq)){grupo=g;break;}
  }
  const tabla=calcTabla(grupo);
  const stats=tabla.find(x=>x.n===eq)||{pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};
  const pos=tabla.findIndex(x=>x.n===eq)+1;
  const totalGrupo=E.partidos.filter(p=>p.grupo===grupo).length;
  const jugadosGrupo=E.partidos.filter(p=>p.grupo===grupo&&p.gL!==null).length;

  const partJugados=E.partidos.filter(p=>(p.local===eq||p.visitante===eq)&&p.gL!==null);
  const partPendientes=E.partidos.filter(p=>(p.local===eq||p.visitante===eq)&&p.gL===null);

  function resPartido(p){
    const esLocal=p.local===eq;
    const rival=esLocal?p.visitante:p.local;
    const gF=esLocal?p.gL:p.gV, gC=esLocal?p.gV:p.gL;
    const res=gF>gC?'G':gF<gC?'P':'E';
    const color=res==='G'?'var(--rosa)':res==='P'?'#ccc':'var(--lila)';
    return `<div class="dash-partido">
      <div style="min-width:40px;font-size:0.65rem;color:var(--lila);line-height:1.4">${p.fecha}<br>${p.hora}</div>
      <div style="flex:1;font-size:0.82rem"><b>${rival}</b><br><span style="font-size:0.62rem;color:var(--lila)">🏟 ${p.estadio||''}</span></div>
      <span style="font-family:'Oswald',sans-serif;font-weight:700;color:${color};font-size:1rem">${gF}-${gC}</span>
    </div>`;
  }
  function proxPartido(p){
    const rival=p.local===eq?p.visitante:p.local;
    return `<div class="dash-partido fav-p">
      <div style="min-width:40px;font-size:0.65rem;color:var(--lila);line-height:1.4">${p.fecha}<br>${p.hora}</div>
      <div style="flex:1;font-size:0.82rem"><b>${rival}</b><br><span style="font-size:0.62rem;color:var(--lila)">🏟 ${p.estadio||''}</span></div>
      <span style="font-size:0.65rem;color:var(--lila)">PEND.</span>
    </div>`;
  }

  const clasif=pos<=2?'<span class="badge clasif">CLASIFICA</span>':pos===3?'<span class="badge playoff-b">PLAYOFF</span>':'<span class="badge elim">GRUPO</span>';

  let html=`
  <div class="pais-hero">
    <div class="flag">${flag}</div>
    <div class="ph-info">
      <h2>${nombre}</h2>
      <p>Grupo ${grupo} · Posición ${pos} ${clasif}</p>
    </div>
  </div>
  <div class="pais-stats">
    <div class="pais-stat"><div class="ps-num">${stats.pts}</div><div class="ps-lbl">Puntos</div></div>
    <div class="pais-stat"><div class="ps-num">${stats.pg}</div><div class="ps-lbl">Ganados</div></div>
    <div class="pais-stat"><div class="ps-num">${stats.pe}</div><div class="ps-lbl">Empates</div></div>
    <div class="pais-stat"><div class="ps-num">${stats.pp}</div><div class="ps-lbl">Perdidos</div></div>
  </div>
  <div class="pais-stats">
    <div class="pais-stat"><div class="ps-num">${stats.gf}</div><div class="ps-lbl">Goles F.</div></div>
    <div class="pais-stat"><div class="ps-num">${stats.gc}</div><div class="ps-lbl">Goles C.</div></div>
    <div class="pais-stat"><div class="ps-num">${stats.gf-stats.gc>0?'+':''}${stats.gf-stats.gc}</div><div class="ps-lbl">Dif. Gol</div></div>
    <div class="pais-stat"><div class="ps-num">${stats.pj}</div><div class="ps-lbl">Jugados</div></div>
  </div>`;

  if(partJugados.length){
    html+=`<div class="seccion-titulo">Partidos jugados</div>`;
    html+=partJugados.map(resPartido).join('');
  }
  if(partPendientes.length){
    html+=`<div class="seccion-titulo">Próximos partidos</div>`;
    html+=partPendientes.map(proxPartido).join('');
  }
  return html;
}

function renderBusqueda(query=''){
  const todos=todosLosEquipos();
  const q=(query||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

  let sugerenciasHTML='';
  if(q.length>=2){
    const matches=todos.filter(e=>{
      const n=e.split(' ').slice(1).join(' ').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');
      return n.includes(q);
    });
    if(matches.length>1){
      sugerenciasHTML=`<div class="sugerencias">${matches.map(e=>`<div class="sugerencia-item" onclick="ejecutarBusqueda('${e}')">${e}</div>`).join('')}</div>`;
    }
  }

  const resultado = q.length>=2 ? buscarPais(q) : null;
  const resultadoHTML = resultado ? renderPais(resultado) : (q.length>=2?`<div class="empty"><div class="ic">😕</div><p>No encontramos "${query}"</p></div>`:'');

  document.getElementById('tab-busqueda').innerHTML=`
    <div class="busqueda-bar">
      <input type="text" id="busqueda-input" placeholder="Buscar país... (ej: Argentina)" value="${query}"
        oninput="renderBusqueda(this.value)" autocomplete="off">
    </div>
    ${sugerenciasHTML}
    ${resultadoHTML}`;

  if(window.twemoji) twemoji.parse(document.getElementById('tab-busqueda'),{folder:'svg',ext:'.svg',base:'https://cdn.jsdelivr.net/gh/jdecked/twemoji@latest/assets/'});
}

function ejecutarBusqueda(eq){
  document.getElementById('busqueda-input').value=eq.split(' ').slice(1).join(' ');
  renderBusqueda(eq.split(' ').slice(1).join(' '));
}

// ═══════════════════════════════════════════════════════════
// PREDICCIONES
// ═══════════════════════════════════════════════════════════
function renderPredicciones(){
  const er = getElimResuelto();

  // Dado un cruce ID, devuelve el nombre del ganador si ya se jugó,
  // o los dos posibles equipos si no
  function equiposPosibles(cruceId){
    const d = er[cruceId];
    if(!d) return {ganador:null, posibles:['?','?']};
    if(d.ganador) return {ganador: d.ganador, posibles:[d.ganador]};
    return {ganador:null, posibles:[d.e1||'?', d.e2||'?'].filter(x=>x!=='A definir'||true)};
  }

  // Nombre limpio sin emoji
  function nom(s){ return s ? s.replace(' (prov.)','') : '?'; }

  // Renderiza una línea de cruce para la vista de predicciones
  function lineaCruce(c, er){
    const d = er[c.id];
    const e1 = nom(d?.e1||'A definir');
    const e2 = nom(d?.e2||'A definir');
    const ganador = d?.ganador;
    const indefinido = e1==='A definir'||e2==='A definir';

    let estado;
    if(ganador){
      estado = `<span class="pred-gan">✅ ${ganador} avanza</span>`;
    } else if(indefinido){
      estado = `<span class="pred-pend">⏳ Equipos por definir</span>`;
    } else {
      estado = `<span class="pred-pend">⏳ Pendiente</span>`;
    }

    return `<div class="pred-cruce">
      <div class="pred-fecha">${c.fecha||''} · ${c.hora||''} <span class="pred-ronda">${c.r}</span></div>
      <div class="pred-vs">${e1} <span class="pred-sep">vs</span> ${e2}</div>
      <div class="pred-estado">${estado}</div>
    </div>`;
  }

  // Para cada cruce de 16avos, trazar el camino completo
  function caminoCruce(dId){
    // 16avo → octavo → cuarto → semi → final
    const d = CRUCES_D16.find(c=>c.id===dId);
    if(!d) return '';
    const dd = er[dId];
    const e1 = nom(dd?.e1||'A definir');
    const e2 = nom(dd?.e2||'A definir');
    const gan = dd?.ganador;

    // Buscar octavo que viene de este 16avo
    const oct = CRUCES_OCTAVOS_DEF.find(c=>c.e1===`G-${dId}`||c.e2===`G-${dId}`);
    const cuarto = oct ? CRUCES_CUARTOS_DEF.find(c=>c.e1===`G-${oct.id}`||c.e2===`G-${oct.id}`) : null;
    const semi = cuarto ? CRUCES_SEMI_DEF.find(c=>c.e1===`G-${cuarto.id}`||c.e2===`G-${cuarto.id}`) : null;
    const final_ = semi ? CRUCES_FINAL_DEF.find(c=>c.id==='GF'&&(c.e1===`G-${semi.id}`||c.e2===`G-${semi.id}`)) : null;

    function rival(cruceId, propioId){
      const c = TODAS_ELIM.find(x=>x.id===cruceId);
      if(!c) return null;
      const otroRef = c.e1===`G-${propioId}` ? c.e2 : c.e1;
      const otroId = otroRef.slice(2);
      const erd = er[otroId];
      if(erd?.ganador) return erd.ganador;
      if(erd?.e1&&erd?.e1!=='A definir'&&erd?.e2&&erd?.e2!=='A definir')
        return `${nom(erd.e1)} o ${nom(erd.e2)}`;
      return 'A definir';
    }

    const rivalOct = oct ? rival(oct.id, dId) : null;
    const rivalCuarto = cuarto && oct ? rival(cuarto.id, oct.id) : null;
    const rivalSemi = semi && cuarto ? rival(semi.id, cuarto.id) : null;
    const rivalFinal = final_ && semi ? rival(final_.id, semi.id) : null;

    const campeón = gan ? nom(gan) : (e1!=='A definir'&&e2!=='A definir'?`${e1} o ${e2}`:'A definir');

    let rows = '';
    const pasos = [
      oct    ? {r:'Octavos', rival:rivalOct,    fecha:oct.fecha,    ganador: er[oct.id]?.ganador}    : null,
      cuarto ? {r:'Cuartos', rival:rivalCuarto, fecha:cuarto.fecha, ganador: er[cuarto.id]?.ganador} : null,
      semi   ? {r:'Semis',   rival:rivalSemi,   fecha:semi.fecha,   ganador: er[semi.id]?.ganador}   : null,
      final_ ? {r:'Final',   rival:rivalFinal,  fecha:final_.fecha, ganador: er[final_.id]?.ganador} : null,
    ].filter(Boolean);

    pasos.forEach(p=>{
      const icon = p.ganador ? '✅' : '🔮';
      const txt = p.ganador
        ? `<b>${nom(p.ganador)}</b> ganó`
        : `vs <b>${p.rival||'A definir'}</b>`;
      rows += `<div class="pred-paso"><span class="pred-paso-r">${p.r}</span> <span class="pred-paso-f">${p.fecha}</span> ${icon} ${txt}</div>`;
    });

    const titulo = gan
      ? `${nom(gan)} ✅`
      : (e1!=='A definir'&&e2!=='A definir' ? `${e1} / ${e2}` : 'A definir');

    return `<div class="pred-card">
      <div class="pred-card-titulo">${titulo}</div>
      <div class="pred-card-sub">${d.estadio||''} · ${d.fecha||''}</div>
      ${rows}
    </div>`;
  }

  // Agrupar 16avos por el octavo al que alimentan, en el orden del bracket
  const orden16 = ['D1','D3','D2','D5','D10','D9','D12','D11','D4','D6','D7','D8','D13','D15','D16','D14'];

  let html = `<div class="pred-intro">🔮 Camino de cada selección en el bracket. Se actualiza con cada resultado que cargás.</div>`;

  // Sección: partidos ya jugados en eliminatorias
  const jugadosElim = TODAS_ELIM.filter(c=>er[c.id]?.gL!==null&&er[c.id]?.gL!==undefined);
  if(jugadosElim.length){
    html+=`<div class="pred-seccion">✅ Resultados confirmados</div>`;
    jugadosElim.forEach(c=>{ html+=lineaCruce(c,er); });
  }

  // Sección: próximos eliminatorios
  const pendElim = TODAS_ELIM.filter(c=>!er[c.id]?.ganador).sort((a,b)=>new Date(a.iso)-new Date(b.iso));
  if(pendElim.length){
    html+=`<div class="pred-seccion">⏳ Próximos partidos</div>`;
    pendElim.slice(0,6).forEach(c=>{ html+=lineaCruce(c,er); });
  }

  // Sección: camino de cada selección en 16avos
  html+=`<div class="pred-seccion">🗺️ Camino por el bracket</div>`;
  html+=`<div class="pred-cards">`;
  orden16.forEach(id=>{ html+=caminoCruce(id); });
  html+=`</div>`;

  document.getElementById('tab-predicciones').innerHTML=html;
}

async function abrirHistorial(e1, e2){
  const modal = document.getElementById('modal-historial');
  const titulo = document.getElementById('hist-titulo');
  const body = document.getElementById('hist-body');
  // Limpiar nombres de emojis para la consulta
  const n1 = e1.split(' ').slice(1).join(' ') || e1;
  const n2 = e2.split(' ').slice(1).join(' ') || e2;
  titulo.textContent = `📖 ${n1} vs ${n2}`;
  body.innerHTML = '<span style="color:var(--lila)">Consultando historial...</span>';
  modal.style.display='flex';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:600,
        messages:[{
          role:'user',
          content:`¿Se enfrentaron ${n1} y ${n2} en algún Mundial de fútbol entre 1990 y 2022? Si sí, listá cada partido con: año, ronda, resultado y quién ganó. Si nunca se cruzaron, decilo brevemente. Respondé en español, de forma concisa, sin introducción. Solo los datos.`
        }]
      })
    });
    const data = await resp.json();
    const texto = data.content?.[0]?.text || 'Sin datos disponibles.';
    body.innerHTML = texto.replace(/\n/g,'<br>');
  } catch(e) {
    body.innerHTML = '<span style="color:var(--rojo)">Error al consultar el historial.</span>';
  }
}
